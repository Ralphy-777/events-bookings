services:
  - type: web
    name: eventpro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT backend.asgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        value: "https://event-bookings-eosin.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: eventpro-db
          property: connectionString

databases:
  - name: eventpro-db
    databaseName: eventpro
    user: eventpro_user
